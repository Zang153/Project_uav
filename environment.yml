name: mujoco-sim
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy
  - scipy
  - matplotlib
  - quaternion
  - pip
  - pip:
      - mujoco>=3.0.0
      - --extra-index-url https://download.pytorch.org/whl/cu130
      - torch==2.10.0+cu130
      - torchvision==0.25.0+cu130
      - torchaudio==2.10.0+cu130
